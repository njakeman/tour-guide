<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <rect width="1280" height="800" fill="#f7fafc" />
  <rect x="50" y="30" width="1180" height="60" fill="#4a5568" rx="5" />
  <text x="640" y="65" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Archaeological Tour Guide</text>
  
  <rect x="100" y="120" width="1080" height="600" fill="white" rx="10" stroke="#e2e8f0" stroke-width="2" />
  <text x="640" y="160" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#4a5568">Cissbury Ring: Approach and Enclosure</text>
  
  <rect x="150" y="200" width="980" height="120" fill="#f1f5f9" rx="5" />
  <text x="640" y="240" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#4a5568">Evidence</text>
  <text x="640" y="270" font-family="Arial" font-size="14" text-anchor="middle" fill="#64748b">Visible earthworks define a substantial enclosure on the hilltop with bank-and-ditch circuit</text>
  <text x="640" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="#64748b">Surface finds and investigations support Iron Age activity</text>
  
  <rect x="150" y="350" width="980" height="120" fill="#f1f5f9" rx="5" />
  <text x="640" y="390" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#4a5568">Interpretation</text>
  <text x="640" y="420" font-family="Arial" font-size="14" text-anchor="middle" fill="#64748b">The scale and prominence may have supported gatherings, signalling, or socially meaningful movement</text>
  <text x="640" y="440" font-family="Arial" font-size="14" text-anchor="middle" fill="#64748b">These ideas go beyond the earthworks and depend on comparative models</text>
  
  <rect x="100" y="500" width="1080" height="60" fill="#f1f5f9" rx="25" />
  <circle cx="200" cy="530" r="20" fill="#4a5568" />
  <text x="640" y="540" font-family="Arial" font-size="16" text-anchor="middle" fill="#4a5568">Show interpretation layer</text>
  
  <rect x="100" y="580" width="1080" height="50" fill="#f1f5f9" rx="20" />
  <rect x="200" y="590" width="100" height="30" fill="#4a5568" rx="10" />
  <text x="250" y="605" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Previous</text>
  <text x="640" y="605" font-family="Arial" font-size="14" text-anchor="middle" fill="#4a5568">Stop 1 of 2</text>
  <rect x="980" y="590" width="100" height="30" fill="#4a5568" rx="10" />
  <text x="1030" y="605" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Next</text>
</svg>